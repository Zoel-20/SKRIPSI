<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOCSYS</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <nav class="bottombar">
    <a href="index.html" class="nav-item">
      <span class="nav-icon" style="-webkit-mask-image: url('assets/home.svg'); mask-image: url('assets/home.svg');"></span>
      <span>Home</span>
    </a>
    
    <a href="control.html" class="nav-item">
      <span class="nav-icon" style="-webkit-mask-image: url('assets/control.svg'); mask-image: url('assets/control.svg');"></span>
      <span>Control</span>
    </a>
    
    <a href="reports.html" class="nav-item active">
      <span class="nav-icon" style="-webkit-mask-image: url('assets/reports.svg'); mask-image: url('assets/reports.svg');"></span>
      <span>Reports</span>
    </a>
    
    <a href="profile.html" class="nav-item">
      <span class="nav-icon" style="-webkit-mask-image: url('assets/profile.svg'); mask-image: url('assets/profile.svg');"></span>
      <span>Profile</span>
    </a>
  </nav>

  <div class="container-reports">
    <div class="report-temp">
      <div class="header-chart">
        <h2 class="label-chart">Temperature Chart</h2>
      </div>
      <div class="chart-content">
        <canvas id="reporttempChart"></canvas>
      </div>
    </div>

    <div class="report-hmdty">
      <div class="header-chart">
        <h2 class="label-chart">Humidity Chart</h2>
      </div>
      <div class="chart-content">
        <canvas id="reporthumChart"></canvas>
      </div>
    </div>
  </div>

  <!-- Firebase App (wajib) -->
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
  <!-- Firebase Realtime Database -->
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="report.js"></script> 
</body>
</html>
